name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv.lock is gitignored in this repo, so key the cache off pyproject.toml
      # instead of the default **/uv.lock glob.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      # ruff doesn't import the project, so skip installing it.
      - name: Install dev dependencies
        run: uv sync --only-group dev --no-install-project

      - name: ruff check
        run: uv run --no-sync ruff check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv.lock is gitignored in this repo, so key the cache off pyproject.toml
      # instead of the default **/uv.lock glob.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      # Full sync so the runtime deps (and the openrct2-x7-renderer wheel from
      # PyPI) are importable for type checking.
      - name: Install project + dev deps
        run: uv sync --group dev

      - name: mypy
        run: uv run --no-sync mypy
