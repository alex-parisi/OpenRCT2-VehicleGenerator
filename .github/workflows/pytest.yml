name: pytest

# Python unit tests. The collection step transitively imports
# openrct2_vehicle_generator._x7_renderer (loader -> sprite_renderer ->
# ray_trace), so the native extension has to be built; we install Embree the
# same way cpp-tests does and let `uv sync` drive scikit-build-core.
on:
  push:
    branches: [main]
  pull_request:

env:
  EMBREE_VERSION: "4.4.1"

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install Embree
        run: |
          EMB="$GITHUB_WORKSPACE/embree"
          BASE="https://github.com/RenderKit/embree/releases/download"
          curl -fL -o /tmp/embree.tar.gz \
            "$BASE/v${EMBREE_VERSION}/embree-${EMBREE_VERSION}.x86_64.linux.tar.gz"
          mkdir -p "$EMB"
          tar -xzf /tmp/embree.tar.gz -C "$EMB"
          # Point find_package straight at the CMake config dir so the search
          # never has to guess between lib/ and lib64/.
          EMBREE_CMAKE_DIR=$(find "$EMB" -type d -path '*/cmake/embree-*' | head -n1)
          test -n "$EMBREE_CMAKE_DIR" || { echo "embree cmake dir not found"; exit 1; }
          echo "EMBREE_ROOT=$EMB" >> "$GITHUB_ENV"
          echo "embree_DIR=$EMBREE_CMAKE_DIR" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$EMB/lib64" >> "$GITHUB_ENV"

      # uv.lock is gitignored in this repo, so key the cache off pyproject.toml
      # instead of the default **/uv.lock glob.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      # Full sync this time -- including --install-project so scikit-build-core
      # compiles the _x7_renderer extension that the test collection imports.
      - name: Install project + dev deps
        run: uv sync --group dev

      - name: pytest
        run: uv run --no-sync pytest
