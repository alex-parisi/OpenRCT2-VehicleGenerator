# yamllint config — lints hand-authored ride configs (examples/, textures/),
# not CMake/build artifacts.
extends: default

ignore: |
  build/
  x123_renderer/build/
  x123_renderer/cmake-build-debug/
  dist/

rules:
  document-start: disable        # ride configs don't use a leading '---'
  line-length:
    max: 100
    allow-non-breakable-words: true
  truthy:
    check-keys: false            # allow bare on/off/yes if used as values
