[project]
name = "OpenRCT2-VehicleGenerator"
version = "0.1.0"
description = "Python interface to the OpenRCT2 vehicle sprite generator (Embree-backed)."
readme = "readme.md"
# Pinned to 3.11 to match the CPython that Blender 4.2/4.5 LTS ships, so local
# builds produce the same cp311 ABI as the bundled add-on wheels.
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pillow>=10.0",
    "pyyaml>=6.0",
]

[project.scripts]
openrct2-vehicle-generator = "openrct2_vehicle_generator.__main__:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "types-PyYAML>=6.0",
    "ruff>=0.5",
    "yamllint>=1.35",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["openrct2_vehicle_generator", "scripts", "tests"]

[tool.ruff.lint]
# pyflakes (F), pycodestyle (E/W), isort (I), pyupgrade (UP), bugbear (B).
select = ["E", "F", "I", "UP", "B", "W"]

[tool.mypy]
python_version = "3.11"
files = ["openrct2_vehicle_generator"]
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true

[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.source-dir = "native"
cmake.version = ">=3.25"
wheel.packages = ["openrct2_vehicle_generator"]
build-dir = "build/{wheel_tag}"

# ---------------------------------------------------------------------------
# Wheel building for the Blender add-on bundle.
#
# Target CPython 3.11 — the interpreter Blender 4.2/4.5 LTS ships. (Building
# against the limited API / abi3 to collapse this to one wheel per platform is
# possible via pybind11's STABLE_ABI, but cp311-only keeps the toolchain simple
# and the matrix small.) Embree (+ its bundled TBB) is downloaded by CI and
# vendored into each wheel by the platform repair tool (auditwheel / delocate /
# delvewheel) so the resulting wheel needs no system Embree at runtime.
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp311-*"
build-frontend = "build"
skip = ["*-musllinux*", "*_i686", "*-win32"]
# Sanity check: the extension imports and Embree resolves from vendored libs.
test-command = "python -c \"import openrct2_vehicle_generator._native as n; print('embree ok', n.LIGHT_DIFFUSE)\""

[tool.cibuildwheel.linux]
# The native extension is C++23; the default manylinux2014 image only has
# GCC 10, which can't compile it. manylinux_2_28 (AlmaLinux 8) ships a modern
# gcc-toolset with full C++23 support.
manylinux-x86_64-image = "manylinux_2_28"
# Runs inside the manylinux container; installs Embree to /embree.
before-all = "bash {project}/scripts/ci/install_embree_linux.sh"
environment = { EMBREE_ROOT = "/embree", CMAKE_PREFIX_PATH = "/embree", LD_LIBRARY_PATH = "/embree/lib64" }

[tool.cibuildwheel.macos]
# EMBREE_ROOT / DYLD path are exported by the workflow step before cibuildwheel.
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-build = "pip install delvewheel"
# Embree DLLs live in <EMBREE_ROOT>\bin; delvewheel vendors them into the wheel.
# cibuildwheel runs the repair command via cmd.exe and does not expand its own
# {env:...} placeholder here, so reference the variable with cmd's %VAR% syntax.
repair-wheel-command = "delvewheel repair --add-path %EMBREE_ROOT%\\bin -w {dest_dir} {wheel}"
