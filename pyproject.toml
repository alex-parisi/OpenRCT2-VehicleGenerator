[project]
name = "OpenRCT2-VehicleGenerator"
version = "0.1.0"
description = "Pure-Python port of the makeride sprite generator for OpenRCT2."
readme = "readme.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "pillow>=10.0",
]

[project.scripts]
openrct2-vehicle-generator = "openrct2_vehicle_generator.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openrct2_vehicle_generator"]
