[project]
name = "OpenRCT2-VehicleGenerator"
version = "0.1.0"
description = "Python interface to the OpenRCT2 vehicle sprite generator (Embree-backed)."
readme = "readme.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "pillow>=10.0",
]

[project.scripts]
openrct2-vehicle-generator = "openrct2_vehicle_generator.__main__:main"

[dependency-groups]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.source-dir = "native"
cmake.version = ">=3.25"
wheel.packages = ["openrct2_vehicle_generator"]
build-dir = "build/{wheel_tag}"
