schema_version = "1.0.0"

# Blender 4.2+ extensions import under the bl_ext.<repo>.<id> namespace, so this
# id never collides with the bundled wheel's top-level package. Keep it as
# "openrct2vg": it is the stable install identity Blender matches on to upgrade
# in place, so renaming it would orphan every existing 0.1.0 install (the engine
# would register the old and new ids side by side instead of upgrading).
id = "openrct2vg"
version = "0.1.1"
name = "OpenRCT2 Vehicle Generator"
tagline = "Author and export OpenRCT2 ride vehicles from the scene"
maintainer = "Alex Parisi <alex@atparisi.com>"
type = "add-on"

tags = ["Import-Export", "Render"]
blender_version_min = "4.2.0"

# GPL-3.0-or-later, matching the rest of the project. The bundled wheels carry
# Embree + TBB (Apache-2.0), whose license texts must ship alongside.
license = ["SPDX:GPL-3.0-or-later"]

# The extension targets these platforms; Blender installs the matching wheel.
platforms = ["windows-x64", "macos-arm64", "linux-x64"]

# The external openrct2-x7-renderer wheels (Embree-vendored native extension,
# CPython 3.11 + 3.13, from PyPI), the pure-Python openrct2_objectcommon shared
# layer (from PyPI), this repo's pure-Python openrct2_vehiclegenerator front-end
# wheel, plus numpy/pillow/pyyaml. Regenerated by scripts/collect_wheels.py;
# Blender installs the ones matching its platform AND bundled Python. All listed
# files must be present under ./wheels/ when running
# `blender --command extension build`.
wheels = [
    "./wheels/numpy-2.4.6-cp311-cp311-macosx_11_0_arm64.whl",
    "./wheels/numpy-2.4.6-cp311-cp311-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/numpy-2.4.6-cp311-cp311-win_amd64.whl",
    "./wheels/numpy-2.4.6-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/numpy-2.4.6-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/numpy-2.4.6-cp313-cp313-win_amd64.whl",
    "./wheels/openrct2_objectcommon-0.1.2-py3-none-any.whl",
    "./wheels/openrct2_vehiclegenerator-0.1.1-py3-none-any.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp311-cp311-macosx_11_0_arm64.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp311-cp311-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp311-cp311-win_amd64.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/openrct2_x7_renderer-0.2.0-cp313-cp313-win_amd64.whl",
    "./wheels/pillow-12.2.0-cp311-cp311-macosx_11_0_arm64.whl",
    "./wheels/pillow-12.2.0-cp311-cp311-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/pillow-12.2.0-cp311-cp311-win_amd64.whl",
    "./wheels/pillow-12.2.0-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/pillow-12.2.0-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/pillow-12.2.0-cp313-cp313-win_amd64.whl",
    "./wheels/pyyaml-6.0.3-cp311-cp311-macosx_11_0_arm64.whl",
    "./wheels/pyyaml-6.0.3-cp311-cp311-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/pyyaml-6.0.3-cp311-cp311-win_amd64.whl",
    "./wheels/pyyaml-6.0.3-cp313-cp313-macosx_11_0_arm64.whl",
    "./wheels/pyyaml-6.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl",
    "./wheels/pyyaml-6.0.3-cp313-cp313-win_amd64.whl",
]

[permissions]
files = "Read texture images and write the generated .parkobj"
